<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Reset Sessione</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 50px; text-align: center; }
        .reset-box { background: white; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); border-top: 5px solid #dc3545; }
        .btn-reset { background-color: #dc3545; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="reset-box">
        <h2>Pannello di Reset Sessione</h2>
        <p>Sei bloccato o vuoi cancellare i cookie di sessione orfani del server?</p>
        
        <form action="/clear-session-now" method="POST">
            <button type="submit" class="btn-reset">SVUOTA E RESETTA SESSIONE (A 0)</button>
        </form>
        
        <p style="margin-top: 20px;"><a href="/login">Torna al Login</a></p>
    </div>

</body>
</html>
