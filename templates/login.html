<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login TechShop</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 50px; text-align: center; }
        .form-container { background: white; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); min-width: 300px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .btn-login { background-color: #007bff; }
        .btn-checkout { background-color: #28a745; padding: 12px 24px; font-size: 16px; }
        .btn-shop { background-color: #17a2b8; padding: 10px 20px; font-size: 14px; text-decoration: none; color: white; border-radius: 4px; display: inline-block; margin-top: 10px; font-weight: bold;}
        .btn-logout { background-color: #dc3545; padding: 8px 16px; margin-top: 15px; display: inline-block; text-decoration: none; color: white; border-radius: 4px; font-size: 14px; }
        .success-box { border: 2px solid #28a745; background-color: #d4edda; color: #155724; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="form-container">
        {% if session.get('user_id') %}
            <div class="success-box">
                <h2>Benvenuto, {{ session.get('user_nome') }}!</h2>
                <p>Login effettuato con successo.</p>
            </div>
            
            <a href="/prodotti" class="btn-shop">Vai al Catalogo Prodotti 🛒</a>
            <br><br>

            <h3>Vecchia Simulazione Carrello</h3>
            <button class="btn-checkout" onclick="inviaCheckout()">Simula Ordine</button>
            
            <br>
            <a href="/logout" class="btn-logout">Esci (Reset Sessione)</a>

        {% else %}
            <h2>Accedi al tuo Account</h2>
            <form action="/login" method="POST">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-login">Accedi</button>
            </form>
            <p>Non sei registrato? <a href="/register">Crea un account</a></p>
        {% endif %}
    </div>

    <script>
    function inviaCheckout() {
        fetch('/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                carrello: [{ id_prodotto: 1, quantita: 1 }]
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.message) alert("SUCCESS:\n" + data.message + "\nID Ordine: " + data.id_ordine);
            else if (data.error) alert("ERRORE:\n" + data.error);
        });
    }
    </script>

</body>
</html>
